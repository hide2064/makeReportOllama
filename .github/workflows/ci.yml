name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── バックエンド: pytest ───────────────────────────────────
  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run pytest
        run: pytest tests/backend/ -v --tb=short
        env:
          # chromadb の telemetry を無効化してテスト高速化
          ANONYMIZED_TELEMETRY: "false"

  # ── フロントエンド: vitest (unit) ──────────────────────────
  frontend-test:
    name: Frontend (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run vitest
        run: npm test --prefix frontend

  # ── フロントエンド: TypeScript type check + build ─────────
  frontend-build:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Type check
        run: npx --prefix frontend tsc --noEmit

      - name: Build
        run: npm run build --prefix frontend
